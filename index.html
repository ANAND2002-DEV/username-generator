<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Generator</title>
<p class="tagline">Generate cool gaming, Instagram and stylish usernames instantly.</p>
<link rel="stylesheet" href="style.css">

<body>

<div class="container">

<h1>Username Generator</h1>

<p class="tagline">
Generate cool usernames for gaming and social media
</p>

<input type="text" id="nameInput" placeholder="Enter your name">

<div class="buttons">
    <button onclick="generateUsernames()">Generate</button>
    <button onclick="generateUsernames()">Generate More</button>
</div>

<button class="copyAllBtn" onclick="copyAll()">Copy All</button>
  
<!-- NORMAL USERNAMES -->
<div id="result"></div>

<!-- STYLISH USERNAMES -->
<h2>Stylish Usernames</h2>

<div id="stylishResult"></div>

</div>

<script src="script.js"></script>

</body>
</html>
<button onclick="copyAll()">Copy All</button>
