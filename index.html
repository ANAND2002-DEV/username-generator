<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Username Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Username Generator</h1>

    <p class="tagline">Generate cool usernames for gaming, Instagram and social media</p>

    <input type="text" id="name" placeholder="Enter your name">

    <div class="buttons">
        <button onclick="generate()">Generate</button>
        <button onclick="generate()">Generate More</button>
        <button onclick="copyUsername()">Copy</button>
    </div>

    <div class="result-box">
        <p id="result"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
